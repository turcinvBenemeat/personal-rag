# personal-rag — Jetson Orin Nano Super (JetPack 6.2, CUDA 12.6)
#
# Run ON the Jetson. Requires NVIDIA Container Toolkit.
#
# Usage:
#   docker compose -f docker-compose.jetson.yml run --rm rag python -m rag.indexer
#   docker compose -f docker-compose.jetson.yml run --rm rag python -m rag.query "your question"
#
# Or use the Makefile shortcuts:
#   make build-jetson
#   make jetson-index
#   make jetson-query Q="your question"

services:
  rag:
    build:
      context: .
      dockerfile: Dockerfile.jetson
    image: personal-rag:jetson
    runtime: nvidia
    volumes:
      - chroma:/data/chroma
      - hf-cache:/data/hf-cache
      - ./logs:/data/logs                      # app logs, readable on the host
      - ${RAG_VAULT_PATH:-/tmp}:/vault:ro
      - ${RAG_PDF_BOOKS_PATH:-/tmp}:/books:ro
      - ${RAG_PDF_RESOURCES_PATH:-/tmp}:/resources:ro
      - ${RAG_JSON_PATH:-/tmp}:/index:ro
    environment:
      RAG_VAULT_PATH: /vault
      RAG_PDF_BOOKS_PATH: /books
      RAG_PDF_RESOURCES_PATH: /resources
      RAG_JSON_PATH: /index
      RAG_INDEX_PATH: /data/chroma
      RAG_LOG_PATH: /data/logs/rag.log
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility

volumes:
  chroma:
  hf-cache:
