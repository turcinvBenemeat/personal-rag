name: tests

on:
  push:
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Python 3.12 to match the x86 image (Dockerfile) — and because the pinned
      # numpy in requirements.txt requires Python >= 3.11.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e . --no-deps
          pip install pytest

      - name: Run offline unit suite
        run: pytest tests/ -q
